      width: 100%;
      position: absolute;

    }

      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 320px;
    }

    #search-wrapper .search-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-radius: 10px;
      padding: 0 14px;
      height: 44px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    #search-wrapper .search-inner svg {
      flex-shrink: 0;
      color: #888;
    }

      border: none;
      outline: none;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      color: #333;
      background: transparent;
    }

    /* ── ZOOM CONTROLS ──────────────────────────────────────── */
    #zoom-controls {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;

      background: #fff;

      width: 0%;
      transition: width 0.2s;
      border-radius: 2px;
    }
  </style>

    function geocodeAddresses(addresses, callback) {
      const geocoder = new google.maps.Geocoder();
      const locations = [];
      let completed = 0;
      const total = addresses.length;

      addresses.forEach((addr, idx) => {
        setTimeout(() => {
          geocoder.geocode({ address: addr }, (results, status) => {
            if (status === 'OK' && results && results[0]) {
              locations.push(results[0].geometry.location);
            } else {
              console.warn('Geocode failed for ' + addr + ': ' + status);
            }
            completed++;
            // Update progress bar
            const pct = Math.round((completed / total) * 100);
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('loading-text').textContent =
              `Loading coverage… ${completed} / ${total}`;

            if (completed === total) {
              setTimeout(() => {
                const overlay = document.getElementById('loading-overlay');
                overlay.classList.add('hidden');
                setTimeout(() => overlay.remove(), 600);
              }, 400);
              callback(locations);
            }
          });
        }, idx * 100);
      });
    }

          { featureType: 'administrative.country', elementType: 'geometry.stroke', stylers: [{ color: '#4a5568' }] },
          { featureType: 'administrative.province', elementType: 'geometry.stroke', stylers: [{ color: '#2d3748' }] },
          { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#1a2035' }] },
          { featureType: 'landscape.natural.landcover', elementType: 'geometry', stylers: [{ color: '#1e2840' }] },
          { featureType: 'poi', stylers: [{ visibility: 'off' }] },
          { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#263150' }] },
          { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#1a2035' }] },
          { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#2e3e60' }] },
          { featureType: 'transit', stylers: [{ visibility: 'off' }] },
          { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1b2a' }] },
          { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#3a5f7d' }] }
        ]
      });

      // Search box
      const searchBox = new google.maps.places.SearchBox(document.getElementById('search-box'));
      map.addListener('bounds_changed', () => searchBox.setBounds(map.getBounds()));

      let searchMarkers = [];
      searchBox.addListener('places_changed', () => {
        const places = searchBox.getPlaces();
        if (!places || places.length === 0) return;
        searchMarkers.forEach(m => m.setMap(null));
        searchMarkers = [];
        const bounds = new google.maps.LatLngBounds();
        places.forEach(place => {
          if (!place.geometry || !place.geometry.location) return;
          searchMarkers.push(new google.maps.Marker({
            map,
            title: place.name,
            position: place.geometry.location,
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 8,
              fillColor: '#28c928',
              fillOpacity: 1,
              strokeColor: '#fff',
              strokeWeight: 2
            }
          }));
          if (place.geometry.viewport) bounds.union(place.geometry.viewport);
          else bounds.extend(place.geometry.location);
        });
        map.fitBounds(bounds);
      });

      // Custom zoom buttons
      document.getElementById('zoom-in').addEventListener('click', () => map.setZoom(map.getZoom() + 1));
      document.getElementById('zoom-out').addEventListener('click', () => map.setZoom(map.getZoom() - 1));

      // Geocode & build heatmap
      geocodeAddresses(rateCenterAddresses, (locations) => {
        RateCenterHeatmap = new google.maps.visualization.HeatmapLayer({
          data: locations,
          map: map,
          gradient: gradient,
          radius: getRadiusForZoom(map.getZoom()),
          opacity: 0.85,
          maxIntensity: 3,
          dissipating: true
        });
      });

      map.addListener('zoom_changed', () => {
        if (RateCenterHeatmap) RateCenterHeatmap.set('radius', getRadiusForZoom(map.getZoom()));
      });

      // Toggle coverage button
      document.getElementById('toggle-partner').addEventListener('click', () => {
        if (RateCenterHeatmap) {
          const isVisible = !!RateCenterHeatmap.getMap();
          RateCenterHeatmap.setMap(isVisible ? null : map);
          document.querySelector('#toggle-partner .dot').style.background = isVisible ? '#aaa' : '#28c928';
        }
      });

      // Tab switching
      document.getElementById('btn-coverage').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('btn-subscription').classList.remove('active');
      });
      document.getElementById('btn-subscription').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('btn-coverage').classList.remove('active');
      });
    }

    function getRadiusForZoom(zoom) {
      // Scale exponentially so coverage maintains geographic width when zooming
      const radius = 15 * Math.pow(2, zoom - 4);
      return Math.min(Math.max(Math.round(radius), 10), 500);
    }

  </script>
